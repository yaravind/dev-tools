title: Developer Tools
description: >-
  One command to bootstrap scripts for software and data engineers. Quickly setup Apple Silicon macOS and Windows 11 with 30+ curated tools.
url: "https://yaravind.github.io"
baseurl: "/dev-tools"

# Google Analytics
google_analytics: G-GP9XY5FJBH

# SEO and social
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

author:
  name: Aravind Yarram
  url: https://github.com/yaravind
  twitter: yaravind
social:
  github: yaravind/dev-tools
  twitter: yaravind
  linkedin: aravindyarram

theme: jekyll-theme-cayman

# Navigation pages
header_pages:
  - docs/faq.md
  - docs/details.md
  - docs/scripts.md
  - CONTRIBUTING.md
  - docs/index.md

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Ensure docs pages are rendered with the theme layout
defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: default

# Exclude files not needed in the built site
exclude:
  - scripts/
  - config/
  - assets/triples.dot
  - "*.sh"
  - "*.ps1"
  - .github/
  - "Gemfile"
  - "Gemfile.lock"
