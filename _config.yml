title: Developer Tools
description: >-
  One command to bootstrap scripts for software and data engineers. Quickly set up Apple Silicon macOS and Windows 11 with 30+ curated tools.
url: "https://yaravind.github.io"
baseurl: "/dev-tools"

# SEO and social
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

author:
  name: Aravind Yarram
  url: https://github.com/yaravind
  twitter: yaravind
social:
  github: yaravind/dev-tools
  twitter: yaravind
  linkedin: aravindyarram

theme: jekyll-theme-cayman

# Navigation pages
header_pages:
  - DETAILS.md
  - CONTRIBUTING.md

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Exclude files not needed in the built site
exclude:
  - scripts/
  - config/
  - assets/triples.dot
  - docs/
  - "*.sh"
  - "*.ps1"
  - .github/
  - "Gemfile"
  - "Gemfile.lock"
