<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">

<!-- Google Analytics -->
{% if site.google_analytics %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}');
</script>
{% endif %}

<!-- Floating hamburger menu for quick site navigation -->
<style>
  .site-menu-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    width: 44px;
    height: 44px;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 10px;
    background: #ffffff;
    color: #1f2937;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.16);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    line-height: 1;
  }

  .site-menu-panel {
    position: fixed;
    top: 64px;
    right: 14px;
    z-index: 9998;
    min-width: 220px;
    border: 1px solid rgba(0, 0, 0, 0.14);
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    padding: 8px;
  }

  .site-menu-panel[hidden] {
    display: none;
  }

  .site-menu-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .site-menu-list li {
    margin: 0;
    padding: 0;
  }

  .site-menu-list a {
    display: block;
    padding: 10px 12px;
    border-radius: 8px;
    color: #111827;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  .site-menu-list a:hover,
  .site-menu-list a:focus {
    background: #f3f4f6;
    outline: none;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (document.querySelector('[data-site-menu="toggle"]')) {
      return;
    }

    var links = [
      { label: 'Home', href: '{{ "/" | relative_url }}' },
      { label: 'FAQ', href: '{{ "/faq/" | relative_url }}' },
      { label: 'Scripts', href: '{{ "/scripts/" | relative_url }}' },
      { label: 'Details', href: '{{ "/details/" | relative_url }}' },
      { label: 'IntelliJ IDEA', href: '{{ "/docs/intellij-idea/" | relative_url }}' },
      { label: 'Details - VS Code', href: '{{ "/docs/vscode-info/" | relative_url }}' }
    ];

    var toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'site-menu-toggle';
    toggle.setAttribute('aria-label', 'Open navigation menu');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('data-site-menu', 'toggle');
    toggle.textContent = '\u2630';

    var panel = document.createElement('nav');
    panel.className = 'site-menu-panel';
    panel.setAttribute('aria-label', 'Site navigation');
    panel.setAttribute('data-site-menu', 'panel');
    panel.hidden = true;

    var list = document.createElement('ul');
    list.className = 'site-menu-list';

    links.forEach(function (item) {
      var listItem = document.createElement('li');
      var anchor = document.createElement('a');
      anchor.href = item.href;
      anchor.textContent = item.label;
      listItem.appendChild(anchor);
      list.appendChild(listItem);
    });

    panel.appendChild(list);
    document.body.appendChild(toggle);
    document.body.appendChild(panel);

    function closeMenu() {
      panel.hidden = true;
      toggle.setAttribute('aria-expanded', 'false');
    }

    function openMenu() {
      panel.hidden = false;
      toggle.setAttribute('aria-expanded', 'true');
    }

    toggle.addEventListener('click', function (event) {
      event.stopPropagation();
      if (panel.hidden) {
        openMenu();
      } else {
        closeMenu();
      }
    });

    panel.addEventListener('click', function (event) {
      event.stopPropagation();
    });

    document.addEventListener('click', function () {
      closeMenu();
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeMenu();
      }
    });
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var pageHeader = document.querySelector('.page-header');
    if (!pageHeader || pageHeader.querySelector('[data-site-download-zip="true"]')) {
      return;
    }

    var zipButton = document.createElement('a');
    zipButton.className = 'btn';
    zipButton.href = 'https://github.com/yaravind/dev-tools/archive/refs/heads/main.zip';
    zipButton.textContent = 'Download .zip';
    zipButton.setAttribute('data-site-download-zip', 'true');

    // Preserve Cayman default button order; add custom zip button after existing buttons.
    pageHeader.appendChild(zipButton);
  });
</script>

{% if page.fork_ribbon != false %}
<!-- Fork ribbon styles + injector -->
<style>
  .fork-ribbon {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10000;
    pointer-events: none;
  }

  .fork-ribbon a {
    pointer-events: auto;
    display: block;
    background: #151513;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
    padding: 8px 48px;
    transform: translate(-34px, 18px) rotate(-45deg);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.22);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    white-space: nowrap;
  }

  .fork-ribbon a:hover,
  .fork-ribbon a:focus {
    background: #0b0b0b;
  }

  @media (max-width: 640px) {
    .fork-ribbon { display: none; }
  }
</style>

<script>
  (function () {
    function injectForkRibbon() {
      if (document.querySelector('.fork-ribbon')) return;

      var repo = "{{ site.social.github | default: site.github | escape }}";
      if (!repo) return;

      var container = document.createElement('div');
      container.className = 'fork-ribbon';

      var anchor = document.createElement('a');
      anchor.href = 'https://github.com/' + repo;
      anchor.target = '_blank';
      anchor.rel = 'noopener noreferrer';
      anchor.setAttribute('aria-label', 'Fork me on GitHub');
      anchor.textContent = 'Fork me';

      container.appendChild(anchor);
      document.body.appendChild(container);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', injectForkRibbon);
      window.addEventListener('load', injectForkRibbon);
    } else {
      injectForkRibbon();
    }
  })();
</script>
{% endif %}
