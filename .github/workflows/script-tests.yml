name: Script Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  macos-tests:
    name: macOS Script Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Run ShellCheck on bash/sh scripts only
        run: |
          grep -lE '^#! */bin/(bash|sh)' scripts/macos/*.sh | xargs -r shellcheck -x

      - name: Run macOS dry-run harness
        shell: bash
        run: |
          chmod +x ./scripts/macos/run_tests.sh
          ./scripts/macos/run_tests.sh

  windows-tests:
    name: Windows Script Tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        run: pwsh -c 'Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser'

      - name: Run PSScriptAnalyzer on scripts/windows/*.ps1
        run: pwsh -c 'Import-Module PSScriptAnalyzer; Invoke-ScriptAnalyzer -Path scripts/windows/*.ps1'

      - name: Run Windows dry-run harness
        shell: pwsh
        run: |
          ./scripts/windows/run_tests.ps1
