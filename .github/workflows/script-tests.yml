name: Script Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  macos-tests:
    name: macOS Script Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run macOS dry-run harness
        shell: zsh
        run: |
          chmod +x ./scripts/macos/run_tests.sh
          ./scripts/macos/run_tests.sh

  windows-tests:
    name: Windows Script Tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Windows dry-run harness
        shell: pwsh
        run: |
          ./scripts/windows/run_tests.ps1
